# Ansible 主机清单
# 根据实际环境修改 IP 地址和 SSH 配置
# 文档: https://docs.ansible.com/ansible/latest/user_guide/intro_inventory.html

[all:vars]
# 全局变量
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

# ============================================================
# Ubuntu x86_64 开发机
# ============================================================
[ubuntu_amd64]
# dev-ubuntu-01 ansible_host=192.168.1.101 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa
# dev-ubuntu-02 ansible_host=192.168.1.102 ansible_user=ubuntu

[ubuntu_amd64:vars]
target_arch=amd64
os_family=ubuntu

# ============================================================
# 麒麟 ARM64 目标机
# ============================================================
[kylin_arm64]
# kylin-dev-01 ansible_host=192.168.1.201 ansible_user=kylin ansible_ssh_private_key_file=~/.ssh/id_rsa
# kylin-dev-02 ansible_host=192.168.1.202 ansible_user=kylin

[kylin_arm64:vars]
target_arch=arm64
os_family=kylin

# ============================================================
# Ubuntu ARM64 开发机
# ============================================================
[ubuntu_arm64]
# arm-ubuntu-01 ansible_host=192.168.1.301 ansible_user=ubuntu

[ubuntu_arm64:vars]
target_arch=arm64
os_family=ubuntu

# ============================================================
# 组合组
# ============================================================
[dev_machines:children]
ubuntu_amd64
ubuntu_arm64

[all_targets:children]
dev_machines
kylin_arm64
