---
# Bootstrap Playbook: 初始化目标机
# 功能：安装容器运行时、配置系统基础环境
# 用法: ansible-playbook playbooks/bootstrap.yml -i inventory/hosts.ini
- name: Bootstrap target machines
  hosts: all
  become: true
  gather_facts: true

  vars:
    runtime_priority:
      - podman     # 优先：无守护进程，无需 root
      - docker     # 次选：功能最完整
      - nerdctl    # 备选：containerd 前端
    preferred_runtime: "{{ runtime_priority[0] }}"
    devenv_install_dir: "/opt/devenv"
    devenv_work_dir: "/tmp/devenv-bootstrap"
    # OSS/OBS 配置（从 vault 或环境变量读取）
    oss_bucket: "{{ lookup('env', 'OSS_BUCKET') }}"
    oss_endpoint: "{{ lookup('env', 'OSS_ENDPOINT') }}"

  tasks:
    - name: 检测系统信息
      debug:
        msg: >
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }},
          Arch: {{ ansible_architecture }},
          Kernel: {{ ansible_kernel }}

    - name: 设置架构变量
      set_fact:
        target_arch: "{{ 'arm64' if ansible_architecture in ['aarch64', 'arm64'] else 'amd64' }}"

    - name: 更新 apt 缓存（Debian/Ubuntu）
      apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: 安装基础工具
      package:
        name:
          - curl
          - wget
          - gnupg
          - ca-certificates
          - lsb-release
          - zstd
          - jq
          - python3
          - python3-pip
        state: present

    - name: 检查 Podman 是否可用
      command: which podman
      register: podman_check
      failed_when: false
      changed_when: false

    - name: 安装 Podman（Ubuntu 22.04+）
      apt:
        name:
          - podman
          - buildah
          - skopeo
          - uidmap
          - slirp4netns
        state: present
      when:
        - ansible_os_family == "Debian"
        - podman_check.rc != 0

    - name: 检查 Docker 是否可用
      command: which docker
      register: docker_check
      failed_when: false
      changed_when: false

    - name: 添加 Docker 阿里云 GPG key
      apt_key:
        url: https://mirrors.aliyun.com/docker-ce/linux/ubuntu/gpg
        state: present
      when:
        - ansible_os_family == "Debian"
        - docker_check.rc != 0

    - name: 添加 Docker 阿里云 apt 源
      apt_repository:
        repo: >-
          deb [arch={{ target_arch }}]
          https://mirrors.aliyun.com/docker-ce/linux/ubuntu
          {{ ansible_distribution_release }} stable
        state: present
        filename: docker
      when:
        - ansible_os_family == "Debian"
        - docker_check.rc != 0

    - name: 安装 Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true
      when:
        - ansible_os_family == "Debian"
        - docker_check.rc != 0

    - name: 配置 Docker 镜像加速
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "registry-mirrors": [
              "https://registry.cn-hangzhou.aliyuncs.com",
              "https://mirror.ccs.tencentyun.com"
            ],
            "log-driver": "json-file",
            "log-opts": {"max-size": "10m", "max-file": "3"},
            "storage-driver": "overlay2"
          }
        mode: "0644"
      when: docker_check.rc != 0
      notify: Restart Docker

    - name: 启动并启用 Docker 服务
      systemd:
        name: docker
        state: started
        enabled: true
      when: docker_check.rc != 0

    - name: 创建 devenv 工作目录
      file:
        path: "{{ devenv_install_dir }}"
        state: directory
        mode: "0755"

    - name: 检测可用的容器运行时
      command: "which {{ item }}"
      loop:
        - podman
        - docker
        - nerdctl
      register: runtime_checks
      failed_when: false
      changed_when: false

    - name: 确认运行时安装成功
      debug:
        msg: "可用运行时: {{ runtime_checks.results | selectattr('rc', 'eq', 0) | map(attribute='item') | list }}"

  handlers:
    - name: Restart Docker
      systemd:
        name: docker
        state: restarted
