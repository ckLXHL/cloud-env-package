name: Auto Update (Monthly Rebuild)

on:
  schedule:
    # 每月1日 UTC 02:00 自动重建（系统包更新）
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      force_rebuild_all:
        description: '强制重建所有镜像'
        required: false
        default: true
        type: boolean
      notify_slack:
        description: '发送 Slack 通知'
        required: false
        default: false
        type: boolean

jobs:
  monthly-rebuild:
    name: Monthly Full Rebuild
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: 触发全量构建
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-matrix.yml',
              ref: 'main',
              inputs: {
                layer: 'all',
                push: 'true'
              }
            });
            console.log('已触发全量构建');

  # 检查上游镜像版本更新
  check-upstream-versions:
    name: Check Upstream Versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
      update_summary: ${{ steps.check.outputs.summary }}
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: pip3 install pyyaml requests

      - name: 检查上游版本
        id: check
        run: |
          python3 << 'EOF'
          import yaml
          import json
          import os

          updates = []

          # 检查 CMake 最新版本
          import urllib.request
          try:
              url = "https://api.github.com/repos/Kitware/CMake/releases/latest"
              req = urllib.request.Request(url, headers={"Accept": "application/vnd.github.v3+json"})
              with urllib.request.urlopen(req, timeout=10) as resp:
                  data = json.loads(resp.read())
                  latest_cmake = data["tag_name"].lstrip("v")
                  print(f"CMake latest: {latest_cmake}")
          except Exception as e:
              print(f"检查 CMake 版本失败: {e}")

          print("版本检查完成")
          EOF
          echo "has_updates=false" >> $GITHUB_OUTPUT
          echo "summary=定期检查完成" >> $GITHUB_OUTPUT

  # 发送更新报告
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    permissions: {}
    needs:
      - monthly-rebuild
      - check-upstream-versions
    if: always()
    steps:
      - name: 汇总结果
        run: |
          echo "月度自动维护完成"
          echo "重建状态: ${{ needs.monthly-rebuild.result }}"
          echo "版本检查: ${{ needs.check-upstream-versions.outputs.update_summary }}"
