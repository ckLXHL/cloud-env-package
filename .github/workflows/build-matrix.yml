name: Build Matrix

on:
  workflow_dispatch:
    inputs:
      layer:
        description: '构建层 (base/toolchain/services/compose/all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - base
          - toolchain
          - services
          - compose
      image:
        description: '指定镜像名称（留空则按层构建）'
        required: false
        type: string
      push:
        description: '是否推送到镜像仓库'
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  DOCKER_BUILDKIT: 1

jobs:
  # L0: 构建基础镜像
  build-base:
    name: Build Base Images
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.layer == 'base' ||
      github.event.inputs.layer == 'all'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: base-ubuntu
            context: base/ubuntu-amd64
            version: "22.04"
          - name: base-openeuler
            context: base/openeuler-amd64
            version: "22.03-lts"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: ${{ github.event.inputs.push == 'true' }}
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.name }}:${{ matrix.version }}
            ${{ env.REGISTRY }}/${{ matrix.name }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.name }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.name }}:cache,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  # L1: 构建工具链镜像（并行，无相互依赖）
  build-toolchain:
    name: Build Toolchain Images
    runs-on: ubuntu-latest
    needs: build-base
    if: |
      always() &&
      (needs.build-base.result == 'success' || needs.build-base.result == 'skipped') &&
      (github.event.inputs.layer == 'toolchain' || github.event.inputs.layer == 'all')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: toolchain-cpp
            context: toolchain/cpp
            version: "14.0"
          - name: toolchain-python
            context: toolchain/python
            version: "3.12"
          - name: toolchain-common
            context: toolchain/common
            version: "2.0"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: ${{ github.event.inputs.push == 'true' }}
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.name }}:${{ matrix.version }}
            ${{ env.REGISTRY }}/${{ matrix.name }}:latest
          build-args: |
            REGISTRY=${{ env.REGISTRY }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.name }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.name }}:cache,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  # toolchain-gbench 单独构建（依赖 toolchain-cpp）
  build-gbench:
    name: Build Google Benchmark
    runs-on: ubuntu-latest
    needs: build-toolchain
    if: |
      always() &&
      needs.build-toolchain.result == 'success' &&
      (github.event.inputs.layer == 'toolchain' || github.event.inputs.layer == 'all')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push toolchain-gbench
        uses: docker/build-push-action@v5
        with:
          context: toolchain/gbench
          platforms: linux/amd64
          push: ${{ github.event.inputs.push == 'true' }}
          tags: |
            ${{ env.REGISTRY }}/toolchain-gbench:1.8.3
            ${{ env.REGISTRY }}/toolchain-gbench:latest
          build-args: |
            REGISTRY=${{ env.REGISTRY }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/toolchain-gbench:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/toolchain-gbench:cache,mode=max

  # L2: 构建服务镜像
  build-services:
    name: Build Service Images
    runs-on: ubuntu-latest
    needs: build-toolchain
    if: |
      always() &&
      (needs.build-toolchain.result == 'success' || needs.build-toolchain.result == 'skipped') &&
      (github.event.inputs.layer == 'services' || github.event.inputs.layer == 'all')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: services-docker
            context: services/docker
          - name: services-ansible
            context: services/ansible
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: ${{ github.event.inputs.push == 'true' }}
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.name }}:latest
          build-args: |
            REGISTRY=${{ env.REGISTRY }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.name }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.name }}:cache,mode=max

  # L3: 构建场景组合镜像
  build-compose:
    name: Build Compose Images
    runs-on: ubuntu-latest
    needs:
      - build-services
      - build-gbench
    if: |
      always() &&
      (needs.build-services.result == 'success' || needs.build-services.result == 'skipped') &&
      (needs.build-gbench.result == 'success' || needs.build-gbench.result == 'skipped') &&
      (github.event.inputs.layer == 'compose' || github.event.inputs.layer == 'all')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: compose-full
            context: compose/dev-full
          - name: compose-cpp
            context: compose/dev-cpp
          - name: compose-python
            context: compose/dev-python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: ${{ github.event.inputs.push == 'true' }}
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.name }}:latest
          build-args: |
            REGISTRY=${{ env.REGISTRY }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.name }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.name }}:cache,mode=max
